<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep navy to rich indigo, diagonal for depth -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162544"/>
      <stop offset="50%" stop-color="#1C3468"/>
      <stop offset="100%" stop-color="#264785"/>
    </linearGradient>

    <!-- Top-left light source (Big Sur style depth) -->
    <radialGradient id="topLight" cx="0.25" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- AI glow: radial glow behind the active cell -->
    <radialGradient id="aiGlow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0%" stop-color="#5AB0FF" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#3D8EE8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A73E8" stop-opacity="0"/>
    </radialGradient>

    <!-- Spark gradient (white to electric blue) -->
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8ECFFF"/>
    </linearGradient>

    <!-- Normal cell fill: very subtle frosted glass -->
    <linearGradient id="cellFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Active cell fill: luminous blue -->
    <linearGradient id="activeCellFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5AB0FF" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="#2B7DE9" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4A9FFF" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Glow filter for the spark -->
    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for active cell border -->
    <filter id="cellGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============================================ -->
  <!-- BACKGROUND                                   -->
  <!-- ============================================ -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#topLight)"/>

  <!-- ============================================ -->
  <!-- GRID LAYOUT                                  -->
  <!-- 3x3 cells, centered at 512,512               -->
  <!-- Grid total: 600x600 (from 212,212 to 812,812)-->
  <!-- Cell size: 180x180                            -->
  <!-- Gap size: 30                                  -->
  <!-- Col x:  212, 422, 632                         -->
  <!-- Row y:  212, 422, 632                         -->
  <!-- ============================================ -->

  <!-- Nine cells: frosted glass rectangles -->
  <!-- Row 0 -->
  <rect x="212" y="212" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <rect x="422" y="212" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <rect x="632" y="212" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <!-- Row 1 -->
  <rect x="212" y="422" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <rect x="422" y="422" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <rect x="632" y="422" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <!-- Row 2 -->
  <rect x="212" y="632" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <rect x="422" y="632" width="180" height="180" rx="14" fill="url(#cellFill)"/>
  <rect x="632" y="632" width="180" height="180" rx="14" fill="url(#cellFill)"/>

  <!-- ============================================ -->
  <!-- GRID LINES (single lines in the gaps)        -->
  <!-- Vertical: x = 407 (mid of gap 392-422)       -->
  <!--           x = 617 (mid of gap 602-632)       -->
  <!-- Horizontal: y = 407, y = 617                 -->
  <!-- ============================================ -->
  <line x1="407" y1="212" x2="407" y2="812" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="617" y1="212" x2="617" y2="812" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="212" y1="407" x2="812" y2="407" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="212" y1="617" x2="812" y2="617" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Outer border of the grid -->
  <rect x="212" y="212" width="600" height="600" rx="18"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- ============================================ -->
  <!-- ACTIVE CELL (top-left) — the AI cell         -->
  <!-- ============================================ -->

  <!-- AI glow radiating from behind the cell -->
  <rect x="170" y="170" width="264" height="264" rx="40" fill="url(#aiGlow)"/>

  <!-- Brighter cell fill -->
  <rect x="212" y="212" width="180" height="180" rx="14" fill="url(#activeCellFill)"/>

  <!-- Glowing border -->
  <rect x="212" y="212" width="180" height="180" rx="14"
        fill="none" stroke="#5AB0FF" stroke-width="2.5" filter="url(#cellGlow)" opacity="0.85"/>

  <!-- ============================================ -->
  <!-- SPARK — AI symbol in the active cell         -->
  <!-- Four-pointed star centered at ~296,296       -->
  <!-- Large enough to read at 32x32                -->
  <!-- ============================================ -->
  <g filter="url(#sparkGlow)">
    <!-- Main spark: four-pointed star -->
    <path d="M302,252 L308,288 L344,296 L308,304 L302,340 L296,304 L260,296 L296,288 Z"
          fill="url(#sparkGrad)" opacity="0.92"/>
    <!-- Secondary small spark (upper-right) -->
    <path d="M350,260 L353,274 L367,277 L353,280 L350,294 L347,280 L333,277 L347,274 Z"
          fill="#FFFFFF" opacity="0.50"/>
  </g>

  <!-- ============================================ -->
  <!-- CELL CONTENT HINTS                           -->
  <!-- Subtle marks suggesting data in the grid     -->
  <!-- ============================================ -->

  <!-- Cell (0,1): text lines (left-aligned) -->
  <rect x="448" y="282" width="88" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.20"/>
  <rect x="448" y="302" width="62" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.13"/>
  <rect x="448" y="322" width="76" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.10"/>

  <!-- Cell (0,2): numbers (right-aligned) -->
  <rect x="726" y="282" width="68" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.20"/>
  <rect x="738" y="302" width="56" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.13"/>
  <rect x="746" y="322" width="48" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.10"/>

  <!-- Cell (1,0): mini bar chart (3 bars) -->
  <rect x="252" y="498" width="30" height="68" rx="5" fill="#FFFFFF" fill-opacity="0.11"/>
  <rect x="292" y="470" width="30" height="96" rx="5" fill="#FFFFFF" fill-opacity="0.15"/>
  <rect x="332" y="484" width="30" height="82" rx="5" fill="#FFFFFF" fill-opacity="0.11"/>

  <!-- Cell (1,1): formula equals sign -->
  <rect x="482" y="498" width="60" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.18"/>
  <rect x="482" y="516" width="60" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.18"/>

  <!-- Cell (1,2): single value -->
  <rect x="706" y="504" width="52" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.16"/>

  <!-- Cell (2,0): data rows -->
  <rect x="242" y="706" width="68" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.12"/>
  <rect x="242" y="726" width="48" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.08"/>

  <!-- Cell (2,1): data rows -->
  <rect x="452" y="706" width="56" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.12"/>
  <rect x="452" y="726" width="74" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.08"/>

  <!-- Cell (2,2): checkmark -->
  <path d="M714,716 L728,732 L752,700" stroke="#FFFFFF" stroke-opacity="0.16"
        stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
